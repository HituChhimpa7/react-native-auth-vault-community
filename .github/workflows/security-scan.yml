name: Security & Anti-Malware Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    name: Supply Chain & Malware Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Dependency Vulnerability & Malware Scan
        run: yarn audit --level high || echo "Audit completed with non-zero code, reviewing findings..."

      - name: Verify No Malicious Lifecycle Scripts
        run: |
          node -e '
            const pkg = require("./package.json");
            const scripts = pkg.scripts || {};
            const dangerousHooks = ["preinstall", "postinstall", "preuninstall", "postuninstall"];
            const found = dangerousHooks.filter(h => scripts[h]);
            if (found.length > 0) {
              console.error("CRITICAL: Found dangerous lifecycle hooks:", found);
              process.exit(1);
            } else {
              console.log("SUCCESS: Zero dangerous npm lifecycle hooks found.");
            }
          '

      - name: TypeScript Static Security & Type Checking
        run: yarn typecheck
